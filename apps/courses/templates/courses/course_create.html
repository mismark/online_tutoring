{% extends "base.html" %}
{% load static %}

{% block title %}Create Course{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'courses/css/courses.css' %}">
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        Create New Course
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit"
                                class="btn btn-primary">
                            Create Course
                        </button>

                        <a href="{% url 'courses:course_list' %}"
                           class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'courses/js/courses.js' %}"></script>
{% endblock %}
