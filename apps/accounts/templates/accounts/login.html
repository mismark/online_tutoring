{% extends 'base.html' %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'accounts/css/accounts.css' %}">

<div class="login-page">

<div class="login-card">

<h2>Welcome Back</h2>

<p>Login to continue learning.</p>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Password"
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword()">

<i class="fa fa-eye"></i>

</button>

</div>

</div>

<div class="d-flex justify-content-between">

<div>

<input type="checkbox">

Remember Me

</div>

<a href="{% url 'accounts:forgot_password' %}">

Forgot Password?

</a>

</div>

<button  class="btn btn-primary w-100 mt-4">

Login

</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="{% url 'accounts:register' %}">

Register

</a>

</p>

</div>

</div>

<script src="{% static 'accounts/js/accounts.js' %}"></script>

{% endblock %}
